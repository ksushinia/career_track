{% extends 'base.html' %}
{% block content %}
<div class="create-form-container">
    <h2 class="mt-0 text-dark">Организация нового мероприятия</h2>
    <p class="text-muted mb-20">Заполните данные о вашем научном событии. Оно появится на главной странице для всех исследователей.</p>

    <form action="{{ url_for('create_event') }}" method="POST" class="flex-col">
        <div class="form-group">
            <label for="title" class="form-label">Название мероприятия *</label>
            <input type="text" id="title" name="title" placeholder="Например: Воркшоп по биоинформатике" required class="form-control">
        </div>

        <div class="grid-2-col form-group" style="gap: 15px;">
            <div>
                <label for="date" class="form-label">Дата проведения *</label>
                <input type="date" id="date" name="date" required class="form-control">
            </div>
            <div>
                <label for="format" class="form-label">Формат *</label>
                <select id="format" name="format" required class="form-control">
                    <option value="" disabled selected>Выберите формат</option>
                    <option value="offline">Очное (Offline)</option>
                    <option value="online">Онлайн (Online)</option>
                    <option value="mixed">Смешанное (Mixed)</option>
                </select>
            </div>
        </div>

        <div class="grid-2-col form-group" style="gap: 15px;">
            <div>
                <label for="category" class="form-label">Научное направление *</label>
                <select id="category" name="category" required class="form-control">
                    <option value="" disabled selected>Выберите область</option>
                    <option value="IT и Data Science">IT и Data Science</option>
                    <option value="Биомед">Биомед</option>
                    <option value="Физмат и Инженерия">Физмат и Инженерия</option>
                    <option value="Экономика">Экономика</option>
                    <option value="Гуманитарные и общие">Гуманитарные и общие</option>
                </select>
            </div>
            <div>
                <label for="location" class="form-label">Место / Ссылка</label>
                <input type="text" id="location" name="location" placeholder="Адрес или ссылка на Zoom" class="form-control">
            </div>
        </div>

        <div class="form-group">
            <label for="description" class="form-label">Описание (программа, спикеры) *</label>
            <textarea id="description" name="description" rows="6" placeholder="Расскажите подробнее, что ждет участников..." required class="form-control" style="resize: vertical;"></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-10">Опубликовать мероприятие</button>
        <a href="{{ url_for('company_profile') }}" class="link-primary text-center mt-10" style="display: block;">Отмена</a>
    </form>
</div>
{% endblock %}
