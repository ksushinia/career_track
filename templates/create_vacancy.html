{% extends 'base.html' %}
{% block content %}
<div class="create-form-container">
    <h2 class="mt-0 text-dark">Создание новой вакансии</h2>
    <p class="text-muted mb-20">Заполните форму ниже, чтобы опубликовать позицию или стажировку для молодых исследователей.</p>

    <form action="{{ url_for('create_vacancy') }}" method="POST" class="flex-col">
        <div class="form-group">
            <label for="title" class="form-label">Название должности / проекта *</label>
            <input type="text" id="title" name="title" placeholder="Например: Младший научный сотрудник (Data Science)" required class="form-control">
        </div>

        <div class="grid-2-col form-group" style="gap: 15px;">
            <div>
                <label for="salary_from" class="form-label">Зарплата от (₽)</label>
                <input type="number" id="salary_from" name="salary_from" placeholder="50000" min="0" class="form-control">
            </div>
            <div>
                <label for="salary_to" class="form-label">Зарплата до (₽)</label>
                <input type="number" id="salary_to" name="salary_to" placeholder="100000" min="0" class="form-control">
            </div>
        </div>

        <div class="grid-2-col form-group" style="gap: 15px;">
            <div>
                <label for="experience" class="form-label">Опыт работы *</label>
                <select id="experience" name="experience" required class="form-control">
                    <option value="" disabled selected>Выберите из списка</option>
                    <option value="Без опыта">Без опыта / Стажировка</option>
                    <option value="От 1 года до 3 лет">От 1 года до 3 лет</option>
                    <option value="От 3 до 6 лет">От 3 до 6 лет</option>
                    <option value="Более 6 лет">Более 6 лет</option>
                </select>
            </div>
            <div>
                <label for="schedule" class="form-label">График *</label>
                <select id="schedule" name="schedule" required class="form-control">
                    <option value="" disabled selected>Выберите график</option>
                    <option value="Полный день">Полный день</option>
                    <option value="Гибкий график">Гибкий график</option>
                    <option value="Удаленная работа">Удаленная работа</option>
                    <option value="Проектная работа">Проектная работа</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="category" class="form-label">Научное направление *</label>
            <select id="category" name="category" required class="form-control">
                <option value="" disabled selected>Для поиска по радару талантов</option>
                <option value="IT и Data Science">IT и Data Science</option>
                <option value="Биомед">Биомед</option>
                <option value="Физмат и Инженерия">Физмат и Инженерия</option>
                <option value="Экономика">Экономика</option>
                <option value="Гуманитарные и общие">Гуманитарные и общие</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description" class="form-label">Описание (задачи, требования) *</label>
            <textarea id="description" name="description" rows="6" placeholder="Подробно опишите, чем предстоит заниматься и что вы ожидаете от кандидата..." required class="form-control" style="resize: vertical;"></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-10">Опубликовать вакансию</button>
        <a href="{{ url_for('company_profile') }}" class="link-primary text-center mt-10" style="display: block;">Отмена</a>
    </form>
</div>
{% endblock %}
