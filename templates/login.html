{% extends 'base.html' %}
{% block content %}
<div class="auth-form-container">
    <h2 class="text-center mt-0 mb-20">Вход в систему</h2>
    <form method="POST" class="flex-col">
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="text" name="mail" autocomplete="off" placeholder="Ваш email" required class="form-control">
        </div>
        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" autocomplete="off" placeholder="Ваш пароль" required class="form-control">
        </div>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>
    <p class="text-center mt-20 text-muted mb-0">Нет аккаунта? <a href="{{ url_for('register') }}" class="link-primary">Зарегистрироваться</a></p>
</div>
{% endblock %}
